<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Event Management - Forgot Password</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #89f7fe, #fbc2eb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.forgot-container {
    background: #ffffff;
    padding: 40px;
    width: 380px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.forgot-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #444;
}

.input-group {
    margin-bottom: 18px;
}

.input-group label {
    font-size: 14px;
    font-weight: 600;
    color: #333;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
    background: #f0f4ff;
    font-size: 14px;
}

.eye-wrapper {
    position: relative;
}

.eye {
    position: absolute;
    right: 12px;
    top: 36px;
    cursor: pointer;
    font-size: 14px;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(to right, #36d1dc, #5b86e5);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.section {
    display: none;
}

small {
    font-size: 12px;
    color: #555;
}

#errorMsg {
    color: red;
    display: none;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="forgot-container">
    <h2>Reset Password</h2>

    <form id="resetForm">

        <!-- Gmail Only Email Field -->
        <div class="input-group">
            <label>Email ID</label>
            <input type="email"
                   id="email"
                   placeholder="Enter Registered Gmail ID"
                   required
                   pattern=".+@gmail\.com"
                   title="Please enter a valid Gmail address (example@gmail.com)">
        </div>

        <button type="button" class="btn" onclick="sendOTP()">Send Verification Code</button>

        <!-- OTP Section -->
        <div id="otpSection" class="section">
            <div class="input-group">
                <label>Verification Code</label>
                <input type="text"
                       id="otpInput"
                       placeholder="Enter OTP"
                       required>
            </div>
            <button type="button" class="btn" onclick="verifyOTP()">Verify Code</button>
        </div>

        <!-- Password Section -->
        <div id="passwordSection" class="section">

            <div class="input-group eye-wrapper">
                <label>New Password</label>
                <input type="password"
                       id="newpass"
                       placeholder="Enter New Password"
                       required
                       minlength="8"
                       pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
                       title="Password must contain at least 8 characters, including uppercase, lowercase, number and special character.">
                <span class="eye" onclick="togglePassword('newpass')">👁</span>
            </div>

            <small>
                Password must contain:
                • Minimum 8 characters  
                • 1 Uppercase letter  
                • 1 Lowercase letter  
                • 1 Number  
                • 1 Special character (@$!%*?&)
            </small>

            <div class="input-group eye-wrapper">
                <label>Confirm Password</label>
                <input type="password"
                       id="confirmpass"
                       placeholder="Confirm Password"
                       required>
                <span class="eye" onclick="togglePassword('confirmpass')">👁</span>
            </div>

            <small id="errorMsg">Passwords do not match!</small>

            <button type="submit" class="btn">Update Password</button>
        </div>

    </form>
</div>

<script>

let generatedOTP = "";

/* Send OTP */
function sendOTP() {
    const email = document.getElementById("email");

    if (!email.checkValidity()) {
        email.reportValidity();
        return;
    }

    generatedOTP = Math.floor(100000 + Math.random() * 900000);
    alert("OTP sent to Email: " + generatedOTP); // Simulation only

    document.getElementById("otpSection").style.display = "block";
}

/* Verify OTP */
function verifyOTP() {
    const userOTP = document.getElementById("otpInput").value;

    if (userOTP == generatedOTP) {
        document.getElementById("passwordSection").style.display = "block";
        alert("Verification successful!");
    } else {
        alert("Invalid verification code!");
    }
}

/* Toggle Password Visibility */
function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

/* Password Match Validation */
document.getElementById("resetForm").addEventListener("submit", function(e){

    const newPass = document.getElementById("newpass").value;
    const confirmPass = document.getElementById("confirmpass").value;
    const errorMsg = document.getElementById("errorMsg");

    if(newPass !== confirmPass){
        e.preventDefault();
        errorMsg.style.display = "block";
        document.getElementById("confirmpass").style.border = "2px solid red";
    } else {
        errorMsg.style.display = "none";
        alert("Password Updated Successfully!");
    }

});

</script>

</body>
</html>
