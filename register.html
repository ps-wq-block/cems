<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration - CEMS</title>
    <style>
        /* [Keeping your beautiful CSS styles from the previous version] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #6dd5fa, #c89cff, #a1ffce); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 440px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
        .heading-box { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 6px; color: #333; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #f9f9ff; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: linear-gradient(135deg, #ff7eb3, #ff758c); color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .message { text-align: center; margin-top: 15px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

    <div class="container">
        <div class="heading-box"><h2>Event Registration</h2></div>
        <form id="registerForm">
            <div class="form-group"><label>Student Name</label><input type="text" required></div>
            <div class="form-group"><label>Roll Number</label><input type="text" required></div>
            
            <div class="form-group">
                <label>Event Category</label>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="Social and community">Social and community</option>
                    <option value="Technical events">Technical events</option>
                    <option value="Sports events">Sports events</option>
                </select>
            </div>

            <div class="form-group">
                <label>Specific Event</label>
                <select id="event" required>
                    <option value="">Select Event</option>
                </select>
            </div>

            <button type="submit">Confirm Registration</button>
        </form>
        <div id="msg" class="message"></div>
    </div>

<script>
    const eventsMap = {
        "Social and community": ["Cleanliness Awareness Rally", "Blood Donation Camp"],
        "Technical events": ["Coding Competition", "Hackathon 2026"],
        "Sports events": ["Cricket Tournament", "Football Championship"]
    };

    const catDropdown = document.getElementById("category");
    const eventDropdown = document.getElementById("event");

    // 1. Function to fill events based on category
    function updateEvents(category, selectedEvent = null) {
        eventDropdown.innerHTML = "<option value=''>Select Event</option>";
        if (eventsMap[category]) {
            eventsMap[category].forEach(e => {
                let opt = document.createElement("option");
                opt.value = e;
                opt.text = e;
                if(e === selectedEvent) opt.selected = true;
                eventDropdown.add(opt);
            });
        }
    }

    // 2. MAGIC PART: Read URL Parameters
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const catParam = params.get('cat');   // e.g. "Social and community"
        const eventParam = params.get('event'); // e.g. "Cleanliness Awareness Rally"

        if (catParam) {
            catDropdown.value = catParam;
            updateEvents(catParam, eventParam);
        }
    };

    // Manual change listener
    catDropdown.addEventListener("change", function() {
        updateEvents(this.value);
    });

    document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();
        document.getElementById("msg").innerHTML = "Registration Successful! ✅";
        setTimeout(() => { window.location.href = "categories.html"; }, 2000);
    });
</script>
</body>
</html>
