<!DOCTYPE html>
<html>
<head>
<title>Student Event Registration</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family: Arial, sans-serif;
}

body{
background: linear-gradient(135deg,#6dd5fa,#c89cff,#a1ffce);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Main form card */

.container{
width:440px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

/* Heading box */

.heading-box{
background: linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:15px;
border-radius:10px;
text-align:center;
margin-bottom:25px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.heading-box h2{
letter-spacing:1px;
}

/* Form groups */

.form-group{
margin-bottom:15px;
}

label{
font-weight:bold;
display:block;
margin-bottom:6px;
color:#333;
}

/* Input styling */

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
background:#f9f9ff;
font-size:14px;
transition:0.3s;
box-shadow:0 3px 6px rgba(0,0,0,0.05);
}

/* Focus effect */

input:focus,select:focus{
outline:none;
border-color:#667eea;
background:white;
box-shadow:0 0 8px rgba(102,126,234,0.5);
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background: linear-gradient(135deg,#ff7eb3,#ff758c);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,0.3);
}

/* Success message */

.message{
text-align:center;
margin-top:15px;
font-weight:bold;
color:green;
}

</style>
</head>

<body>

<div class="container">

<div class="heading-box">
<h2>Event Registration</h2>
</div>

<form id="registerForm">

<div class="form-group">
<label>Student Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Roll Number</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Course / Department</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Event Category</label>
<select id="category" required>
<option value="">Select Event Category</option>
<option value="Seminars">Seminars</option>
<option value="Workshops">Workshops</option>
<option value="Technical events">Technical events</option>
<option value="Sports events">Sports events</option>
<option value="Cultural events">Cultural events</option>
<option value="Fine arts">Fine arts</option>
<option value="Guest lectures">Guest lectures</option>
<option value="Literary events">Literary events</option>
<option value="Social and community">Social and community</option>
<option value="Health and wellness">Health and wellness</option>
</select>
</div>

<div class="form-group">
<label>Select Event</label>
<select id="event" required>
<option value="">Select Event</option>
</select>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" maxlength="10" pattern="[0-9]{10}" 
placeholder="Enter 10 digit phone number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>
</div>

<button type="submit">Register</button>

</form>

<div class="message" id="msg"></div>

</div>

<script>

const events = {
Seminars:["AI & Future Technology","Cyber Security Awareness"],
Workshops:["Web Development Workshop","Android App Development"],
"Technical events":["Coding Competition","Hackathon 2026"],
"Sports events":["Cricket Tournament","Football Championship"],
"Cultural events":["Annual Dance Competition","Music Night"],
"Fine arts":["Painting Competition","Sketching Contest"],
"Guest lectures":["AI & Future Technology","Entrepreneurship and Startups"],
"Literary events":["Debate Competition","Poetry Recitation"],
"Social and community":["Tree Plantation Drive","Blood Donation Camp"],
"Health and wellness":["Yoga & Meditation Session","Free Health Check-up"],
};

document.getElementById("category").addEventListener("change",function(){

let category=this.value;
let eventDropdown=document.getElementById("event");

eventDropdown.innerHTML="<option>Select Event</option>";

if(category in events){

events[category].forEach(function(e){

let option=document.createElement("option");
option.text=e;
eventDropdown.add(option);

});

}

});

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("msg").innerHTML="Registration Successful for Selected Event!";

});

</script>

</body>
</html>
