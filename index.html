<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Management - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #89f7fe, #fbc2eb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #444;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: none;
            background: #f0f4ff;
            font-size: 14px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        .success { color: green; }
        .error-text { color: red; font-size: 12px; display: block; margin-top: 4px; }
        .error-border { border: 2px solid red !important; }

        .extra-options {
            margin-bottom: 15px;
            text-align: right;
        }

        .extra-options a {
            text-decoration: none;
            font-size: 13px;
            color: #6a5acd;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>College Event Management</h2>

    <form onsubmit="return loginFunction()">
        <div class="input-group">
            <label>Select Role</label>
            <select id="role">
                <option value="">-- Select Role --</option>
                <option value="student">Student</option>
                <option value="administrator">Administrator</option>
                <option value="organizer">Organizer</option>
            </select>
            <small class="error-text" id="roleError"></small>
        </div>

        <div class="input-group">
            <label>User ID</label>
            <input type="email" id="email" placeholder="Enter Email Address">
            <small class="error-text" id="emailError"></small>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter Password">
            <small class="error-text" id="passwordError"></small>
        </div>

        <div class="extra-options">
            <a href="ForgotPassword.html">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div id="message" class="message"></div>
    </form>
</div>

<script>
function loginFunction() {
    // 1. Get Elements
    const role = document.getElementById("role");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const message = document.getElementById("message");

    const roleError = document.getElementById("roleError");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    // 2. Reset Styles & Errors
    role.classList.remove("error-border");
    email.classList.remove("error-border");
    password.classList.remove("error-border");

    roleError.innerHTML = "";
    emailError.innerHTML = "";
    passwordError.innerHTML = "";
    message.innerHTML = "";

    let valid = true;

    // 3. Validation Logic
    if (role.value === "") {
        role.classList.add("error-border");
        roleError.innerHTML = "Please select a role";
        valid = false;
    }

    if (email.value.trim() === "") {
        email.classList.add("error-border");
        emailError.innerHTML = "Email is required";
        valid = false;
    }

    if (password.value === "") {
        password.classList.add("error-border");
        passwordError.innerHTML = "Password is required";
        valid = false;
    } else {
        // Password Pattern: 8 chars, 1 Upper, 1 Lower, 1 Number, 1 Special
        const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        if (!passwordPattern.test(password.value)) {
            password.classList.add("error-border");
            passwordError.innerHTML = "Password must be at least 8 characters with uppercase, lowercase, number, and special character.";
            valid = false;
        }
    }

    // 4. Final Result
    if (!valid) {
        return false;
    } else {
        // Success: Show message and then redirect
        message.innerHTML = "Login Successful ✅ Redirecting..."; 
        message.className = "message success"; 

        // Redirect to your categories page
        setTimeout(function() {
            window.location.href = "categories.html"; 
        }, 1500);

        return false; // Prevent form from refreshing the page
    }
}
</script>

</body>
</html>
