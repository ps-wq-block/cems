<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg,#6dd5fa,#c89cff,#a1ffce);">

  <div class="w-full max-w-6xl bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold text-white bg-gradient-to-r from-sky-500 to-emerald-500 py-3 rounded-xl">
        View Reports
      </h1>
      <p class="text-gray-600 mt-2">Admin can view all event participation reports here</p>
      <a href="AdminDashboard.html" class="block mt-2 text-sky-600 hover:underline">Back to Dashboard</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-teal-100 p-4 rounded-xl text-center">
        <h2 class="font-semibold">Total Events</h2>
        <p class="text-2xl font-bold" id="totalEvents">0</p>
      </div>
      <div class="bg-blue-100 p-4 rounded-xl text-center">
        <h2 class="font-semibold">Total Participants</h2>
        <p class="text-2xl font-bold" id="totalParticipants">0</p>
      </div>
      <div class="bg-green-100 p-4 rounded-xl text-center">
        <h2 class="font-semibold">Average Attendance</h2>
        <p class="text-2xl font-bold" id="avgAttendance">0%</p>
      </div>
      <div class="bg-purple-100 p-4 rounded-xl text-center">
        <h2 class="font-semibold">Completed Events</h2>
        <p class="text-2xl font-bold" id="completedEvents">0</p>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table id="reportTable" class="w-full border-collapse">
        <thead>
          <tr class="bg-teal-100 text-gray-700">
            <th class="p-2 border">Event Name</th>
            <th class="p-2 border">Date</th>
            <th class="p-2 border">Total</th>
            <th class="p-2 border">Present</th>
            <th class="p-2 border">Attendance %</th>
            <th class="p-2 border">Status</th>
          </tr>
        </thead>
        <tbody id="reportsTableBody">
        </tbody>
      </table>
    </div>

    <div class="mt-6 flex justify-center gap-4">
      <button onclick="exportPDF()" class="bg-gradient-to-r from-red-400 to-pink-500 text-white px-6 py-2 rounded-xl shadow-lg hover:scale-105 transition">
        Export PDF
      </button>
      <button onclick="exportExcel()" class="bg-gradient-to-r from-green-400 to-emerald-600 text-white px-6 py-2 rounded-xl shadow-lg hover:scale-105 transition">
        Export Excel
      </button>
    </div>

    <div class="mt-6 text-center text-gray-500">
      This page is for viewing reports only. No editing actions are allowed.
    </div>
  </div>

  <script>
    const _role = localStorage.getItem("role"); if (!localStorage.getItem("jwt") || (_role && _role.toUpperCase() !== "ADMIN")) { window.location.href = "index.html"; }
</script>
<script>
    async function loadAllReports() {
        const adminHeaders = { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') };
        let eventsRes = await fetch('/api/admin/events', { headers: adminHeaders });
        if(!eventsRes.ok) eventsRes = await fetch('/api/events');
        
        const regsRes = await fetch('/api/registrations', { headers: adminHeaders });
        const events = await eventsRes.json();
        const regs = await regsRes.json();

        let totalParticipants = regs.length;
        let totalPresent = regs.filter(r => r.isPresent).length;
        let avg = totalParticipants === 0 ? 0 : Math.round((totalPresent/totalParticipants)*100);

        document.getElementById('totalEvents').innerText = events.length;
        document.getElementById('totalParticipants').innerText = totalParticipants;
        document.getElementById('avgAttendance').innerText = avg + "%";
        document.getElementById('completedEvents').innerText = events.filter(e => e.status === 'Completed' || e.status === 'Approved').length;

        const tbody = document.getElementById('reportsTableBody');
        tbody.innerHTML = events.map(e => {
            let eRegs = regs.filter(r => r.eventName === e.name);
            let eTotal = eRegs.length;
            let ePres = eRegs.filter(r => r.isPresent).length;
            let ePerc = eTotal === 0 ? 0 : Math.round((ePres/eTotal)*100);
            return `
              <tr class="hover:bg-teal-50 text-center">
                <td class="p-2 border">${e.name}</td>
                <td class="p-2 border">${e.eventDate || 'TBD'}</td>
                <td class="p-2 border">${eTotal}</td>
                <td class="p-2 border">${ePres}</td>
                <td class="p-2 border">${ePerc}%</td>
                <td class="p-2 border font-semibold">${e.status}</td>
              </tr>
            `;
        }).join('');
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("All Events Report", 14, 15);
      doc.autoTable({ html: '#reportTable', startY: 20 });
      doc.save("All_Reports.pdf");
    }

    function exportExcel() {
      // Build data array with proper types
      const headers = ["Event Name", "Date", "Total Registrations", "Present", "Attendance %", "Status"];
      const table = document.getElementById("reportTable");
      const rows = table.querySelectorAll("tbody tr");
      
      const data = [headers];
      rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        if (cells.length === 0) return;
        data.push([
          cells[0].innerText.trim(),
          cells[1].innerText.trim(),
          parseInt(cells[2].innerText.trim()) || 0,
          parseInt(cells[3].innerText.trim()) || 0,
          cells[4].innerText.trim(),
          cells[5].innerText.trim()
        ]);
      });

      const ws = XLSX.utils.aoa_to_sheet(data);

      // Set column widths for readability
      ws['!cols'] = [
        { wch: 30 },  // Event Name
        { wch: 14 },  // Date
        { wch: 20 },  // Total Registrations
        { wch: 12 },  // Present
        { wch: 16 },  // Attendance %
        { wch: 14 }   // Status
      ];

      // Auto-filter on header row
      ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: data.length - 1, c: headers.length - 1 } }) };

      // Add a summary row at the bottom
      const totalRegs = data.slice(1).reduce((sum, r) => sum + (r[2] || 0), 0);
      const totalPresent = data.slice(1).reduce((sum, r) => sum + (r[3] || 0), 0);
      const avgPercent = totalRegs === 0 ? "0%" : Math.round((totalPresent / totalRegs) * 100) + "%";
      const summaryRow = ["TOTAL", "", totalRegs, totalPresent, avgPercent, ""];
      XLSX.utils.sheet_add_aoa(ws, [summaryRow], { origin: -1 });

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Event Reports");
      XLSX.writeFile(wb, "CEMS_Event_Reports.xlsx");
    }

    document.addEventListener('DOMContentLoaded', loadAllReports);
  </script>
</body>
</html>
