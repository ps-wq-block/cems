<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Event Participation Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg,#6dd5fa,#c89cff,#a1ffce);">

  <div class="w-full max-w-5xl bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold text-white bg-gradient-to-r from-sky-500 to-emerald-500 py-3 rounded-xl">
        Event Participation Report
      </h1>
      <a href="OrganizerDashboard.html" class="block mt-2 text-sky-600 hover:underline">Back to Dashboard</a>
    </div>

    <div class="mb-6">
      <label class="block font-medium mb-1">Choose Event</label>
      <select id="eventSelect" onchange="loadReport()" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-teal-400">
      </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-teal-100 p-4 rounded-xl text-center">
        <h2 class="text-lg font-semibold">Total Registered</h2>
        <p class="text-2xl font-bold" id="totalCount">0</p>
      </div>
      <div class="bg-green-100 p-4 rounded-xl text-center">
        <h2 class="text-lg font-semibold">Present</h2>
        <p class="text-2xl font-bold" id="presentCount">0</p>
      </div>
      <div class="bg-blue-100 p-4 rounded-xl text-center">
        <h2 class="text-lg font-semibold">Attendance %</h2>
        <p class="text-2xl font-bold" id="percentCount">0%</p>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table id="reportTable" class="w-full border-collapse">
        <thead>
          <tr class="bg-teal-100 text-gray-700">
            <th class="p-2 border">Roll Number</th>
            <th class="p-2 border">Name</th>
            <th class="p-2 border">Email</th>
            <th class="p-2 border">Course</th>
            <th class="p-2 border">Status</th>
          </tr>
        </thead>
        <tbody id="reportTableBody">
        </tbody>
      </table>
    </div>

    <div class="mt-6 flex justify-center gap-4">
      <button onclick="downloadPDF()" class="bg-gradient-to-r from-green-400 to-blue-500 text-white px-6 py-2 rounded-xl shadow-lg hover:scale-105 transition">
        Download PDF
      </button>
    </div>
  </div>

<script>
// Role Guard
const _role = localStorage.getItem("role"); 
if (!localStorage.getItem("jwt") || (_role && _role.toUpperCase() !== "ADMIN" && _role.toUpperCase() !== "ORGANIZER")) { 
    window.location.href = "index.html"; 
}

// Set Dashboard Link
document.addEventListener("DOMContentLoaded", () => {
    const backLink = document.querySelector('a[href="OrganizerDashboard.html"]');
    if (backLink && _role && _role.toUpperCase() === "ADMIN") {
        backLink.href = "AdminDashboard.html";
    }
});

async function loadEvents() {
    // If admin
    const res = await fetch('/api/admin/events', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }});
    const events = res.ok ? await res.json() : await (await fetch('/api/events')).json();
    const select = document.getElementById('eventSelect');
    select.innerHTML = events.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
    if(events.length > 0) loadReport();
}

async function loadReport() {
    const eventName = document.getElementById('eventSelect').value;
    const res = await fetch(`/api/registrations/event/${eventName}`);
    const participants = await res.json();
    
    let presentCount = participants.filter(p => p.isPresent).length;
    let total = participants.length;
    let percent = total === 0 ? 0 : Math.round((presentCount/total)*100);

    document.getElementById('totalCount').innerText = total;
    document.getElementById('presentCount').innerText = presentCount;
    document.getElementById('percentCount').innerText = percent + "%";

    const tbody = document.getElementById('reportTableBody');
    tbody.innerHTML = participants.map(p => `
      <tr class="hover:bg-teal-50 text-center">
        <td class="p-2 border">${p.rollNumber || '-'}</td>
        <td class="p-2 border">${p.studentName}</td>
        <td class="p-2 border">${p.email}</td>
        <td class="p-2 border">${p.course || '-'}</td>
        <td class="p-2 border font-semibold ${p.isPresent ? 'text-green-600' : 'text-red-500'}">
            ${p.isPresent ? 'Present' : 'Absent'}
        </td>
      </tr>
    `).join('');
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Event Participation Report", 14, 15);
    doc.text("Event: " + document.getElementById('eventSelect').value, 14, 25);
    doc.autoTable({ html: '#reportTable', startY: 30 });
    doc.save("Participation_Report.pdf");
}

document.addEventListener('DOMContentLoaded', loadEvents);
</script>
</body>
</html>
