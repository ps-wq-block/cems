<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events - Admin</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f3e8ff, #e6f7f5);
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #444;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            margin-left: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-approved {
            background: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-suspended {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
        }

        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-suspend {
            background: #ffecb3;
            color: #856404;
        }

        .btn-suspend:hover {
            background: #ffe082;
        }

        .btn-activate {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .btn-activate:hover {
            background: #a5d6a7;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #5b86e5;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">CEMS Admin</div>
        <div class="nav-links">
            <a href="AdminDashboard.html">Dashboard</a>
            <a href="#" class="logout" onclick="localStorage.removeItem('jwt'); localStorage.removeItem('role'); localStorage.removeItem('userId');; window.location.href='index.html'">Logout</a>
        </div>
    </div>

    <div class="container">
        <a href="AdminDashboard.html" class="btn-back">← Back to Dashboard</a>
        <h1>System Events</h1>
        
        <div style="margin-bottom: 25px; display: flex; gap: 15px;">
            <input type="text" id="searchInput" placeholder="Search by name, organizer, category or venue..." 
                   style="flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; font-size: 15px; outline: none;"
                   onkeyup="filterEvents()">
            <select id="categoryFilter" onchange="filterEvents()" 
                    style="padding: 0 20px; border-radius: 25px; border: 1px solid #ddd; background: white; cursor: pointer; outline: none;">
                <option value="All">All Categories</option>
            </select>
            <select id="sortSelect" onchange="filterEvents()" 
                    style="padding: 0 20px; border-radius: 25px; border: 1px solid #ddd; background: white; cursor: pointer; outline: none;">
                <option value="id_desc">Sort: Newest First</option>
                <option value="name_asc">Sort: Eventwise (A-Z)</option>
                <option value="date_asc">Sort: Datewise (Earliest First)</option>
                <option value="venue_asc">Sort: Venuewise (A-Z)</option>
            </select>
        </div>

        <div id="tableContainer">
            <p style="text-align:center;">Loading events...</p>
        </div>
    </div>

    <script>
        // Role Guard
        const _role = localStorage.getItem("role"); if (!localStorage.getItem("jwt") || (_role && _role.toUpperCase() !== "ADMIN")) { window.location.href = "index.html"; }

        let allEvents = [];

        async function fetchEvents() {
            const container = document.getElementById('tableContainer');
            try {
                const response = await fetch('/api/admin/events', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }
                });

                if (response.ok) {
                    allEvents = await response.json();
                    populateCategories();
                    filterEvents(); // Initial render
                } else {
                    container.innerHTML = '<p style="color:red; text-align:center;">Failed to load data.</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color:red; text-align:center;">Connection error.</p>';
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('tableContainer');
            
            if (events.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666;">No events match your search criteria.</p>';
                return;
            }

            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Organizer</th>
                            <th>Category</th>
                            <th>Venue</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            events.forEach(event => {
                const statusClass = `status-${(event.status || 'pending').toLowerCase()}`;
                tableHtml += `
                    <tr>
                        <td><strong>${event.name || '-'}</strong></td>
                        <td>${event.organizerEmail || '-'}</td>
                        <td>${event.category || '-'}</td>
                        <td>${event.venue || '-'}</td>
                        <td>${event.eventDate || 'TBD'}</td>
                        <td><span class="status-pill ${statusClass}">${event.status || 'PENDING'}</span></td>
                        <td>
                            ${event.status === 'Approved' ? 
                                `<button class="btn-action btn-suspend" onclick="toggleSuspension('${event.id}', 'Suspended')">Suspend</button>` : 
                                event.status === 'Suspended' ? 
                                `<button class="btn-action btn-activate" onclick="toggleSuspension('${event.id}', 'Approved')">Activate</button>` : 
                                '-'}
                        </td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            container.innerHTML = tableHtml;
        }

        function filterEvents() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const sortBy = document.getElementById('sortSelect').value;

            let filtered = allEvents.filter(event => {
                const matchesQuery = (event.name && event.name.toLowerCase().includes(query)) ||
                                    (event.organizerEmail && event.organizerEmail.toLowerCase().includes(query)) ||
                                    (event.category && event.category.toLowerCase().includes(query)) ||
                                    (event.venue && event.venue.toLowerCase().includes(query));
                
                const matchesCategory = categoryFilter === "All" || (event.category && event.category === categoryFilter);
                
                return matchesQuery && matchesCategory;
            });

            // Sorting logic
            filtered.sort((a, b) => {
                if (sortBy === "name_asc") {
                    return (a.name || "").localeCompare(b.name || "");
                } else if (sortBy === "date_asc") {
                    return (a.eventDate || "9999-12-31").localeCompare(b.eventDate || "9999-12-31");
                } else if (sortBy === "venue_asc") {
                    return (a.venue || "").localeCompare(b.venue || "");
                } else {
                    return (b.id || "").localeCompare(a.id || ""); // Newest First
                }
            });

            renderEvents(filtered);
        }

        function populateCategories() {
            const filter = document.getElementById('categoryFilter');
            const categories = [...new Set(allEvents.map(e => e.category).filter(Boolean))].sort();
            
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                filter.appendChild(opt);
            });
        }

        async function toggleSuspension(eventId, nextStatus) {
            const confirmMsg = nextStatus === 'Suspended' ? 
                "Are you sure you want to suspend this event? Students will not be able to register." : 
                "Are you sure you want to reactivate this event?";
            
            if (!confirm(confirmMsg)) return;

            try {
                const response = await fetch(`/api/events/${eventId}/status`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': 'Bearer ' + localStorage.getItem('jwt'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        status: nextStatus,
                        adminComments: nextStatus === 'Suspended' ? "Suspended by Administrator" : "Reactivated by Administrator"
                    })
                });

                if (response.ok) {
                    alert(`Event ${nextStatus.toLowerCase()} successfully.`);
                    fetchEvents(); // Refresh table
                } else {
                    alert("Failed to update event status.");
                }
            } catch (error) {
                console.error("Status update error:", error);
                alert("Connection error.");
            }
        }

        fetchEvents();
    </script>
</body>

</html>
