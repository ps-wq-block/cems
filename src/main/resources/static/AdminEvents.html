<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events - Admin</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f3e8ff, #e6f7f5);
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #444;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            margin-left: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-approved {
            background: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #5b86e5;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">CEMS Admin</div>
        <div class="nav-links">
            <a href="AdminDashboard.html">Dashboard</a>
            <a href="#" class="logout" onclick="localStorage.removeItem('jwt'); localStorage.removeItem('role'); localStorage.removeItem('userId');; window.location.href='index.html'">Logout</a>
        </div>
    </div>

    <div class="container">
        <a href="AdminDashboard.html" class="btn-back">← Back to Dashboard</a>
        <h1>System Events</h1>
        
        <div style="margin-bottom: 25px; display: flex; gap: 15px;">
            <input type="text" id="searchInput" placeholder="Search by name, organizer, category or venue..." 
                   style="flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; font-size: 15px; outline: none;"
                   onkeyup="filterEvents()">
            <select id="sortSelect" onchange="filterEvents()" 
                    style="padding: 0 20px; border-radius: 25px; border: 1px solid #ddd; background: white; cursor: pointer; outline: none;">
                <option value="id_desc">Sort: Newest First</option>
                <option value="name_asc">Sort: Eventwise (A-Z)</option>
                <option value="date_asc">Sort: Datewise (Earliest First)</option>
                <option value="venue_asc">Sort: Venuewise (A-Z)</option>
            </select>
        </div>

        <div id="tableContainer">
            <p style="text-align:center;">Loading events...</p>
        </div>
    </div>

    <script>
        // Role Guard
        if (localStorage.getItem("role") !== "ADMIN") {
            window.location.href = "index.html";
        }

        let allEvents = [];

        async function fetchEvents() {
            const container = document.getElementById('tableContainer');
            try {
                const response = await fetch('/api/admin/events', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }
                });

                if (response.ok) {
                    allEvents = await response.json();
                    filterEvents(); // Initial render
                } else {
                    container.innerHTML = '<p style="color:red; text-align:center;">Failed to load data.</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color:red; text-align:center;">Connection error.</p>';
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('tableContainer');
            
            if (events.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666;">No events match your search criteria.</p>';
                return;
            }

            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Event Name</th>
                            <th>Organizer</th>
                            <th>Category</th>
                            <th>Venue</th>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            events.forEach(event => {
                const statusClass = `status-${(event.status || 'pending').toLowerCase()}`;
                tableHtml += `
                    <tr>
                        <td><strong>${event.name || '-'}</strong></td>
                        <td>${event.organizerEmail || '-'}</td>
                        <td>${event.category || '-'}</td>
                        <td>${event.venue || '-'}</td>
                        <td>${event.eventDate || 'TBD'}</td>
                        <td><span class="status-pill ${statusClass}">${event.status || 'PENDING'}</span></td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            container.innerHTML = tableHtml;
        }

        function filterEvents() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;

            let filtered = allEvents.filter(event => 
                (event.name && event.name.toLowerCase().includes(query)) ||
                (event.organizerEmail && event.organizerEmail.toLowerCase().includes(query)) ||
                (event.category && event.category.toLowerCase().includes(query)) ||
                (event.venue && event.venue.toLowerCase().includes(query))
            );

            // Sorting logic
            filtered.sort((a, b) => {
                if (sortBy === "name_asc") {
                    return (a.name || "").localeCompare(b.name || "");
                } else if (sortBy === "date_asc") {
                    return (a.eventDate || "9999-12-31").localeCompare(b.eventDate || "9999-12-31");
                } else if (sortBy === "venue_asc") {
                    return (a.venue || "").localeCompare(b.venue || "");
                } else {
                    return (b.id || "").localeCompare(a.id || ""); // Newest First
                }
            });

            renderEvents(filtered);
        }

        fetchEvents();
    </script>
</body>

</html>
