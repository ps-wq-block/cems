<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account - CEMS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #444;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: none;
            background: #f0f4ff;
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .error-text {
            color: red;
            font-size: 12px;
            display: block;
            margin-top: 4px;
        }

        .error-border {
            border: 2px solid red !important;
        }

        .extra-options {
            margin-bottom: 15px;
            text-align: center;
            margin-top: 15px;
        }

        .extra-options a {
            text-decoration: none;
            font-size: 14px;
            color: #6a5acd;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Create an Account</h2>

        <form id="signupForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter Full Name">
                <small class="error-text" id="nameError"></small>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter Email Address">
                <small class="error-text" id="emailError"></small>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a secure password">
                <small class="error-text" id="passwordError"></small>
            </div>

            <div class="input-group">
                <label>Select Your Role</label>
                <select id="role">
                    <option value="">-- Select Role --</option>
                    <option value="STUDENT">Student</option>
                    <option value="ORGANIZER">Organizer</option>
                    <option value="ADMIN">Administrator</option>
                </select>
                <small class="error-text" id="roleError"></small>
            </div>

            <button type="submit" class="login-btn">Sign Up</button>

            <div class="extra-options">
                <a href="index.html">Already have an account? Login</a>
            </div>

            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            // 1. Get Elements
            const name = document.getElementById("name");
            const email = document.getElementById("email");
            const password = document.getElementById("password");
            const role = document.getElementById("role");
            const message = document.getElementById("message");

            const nameError = document.getElementById("nameError");
            const emailError = document.getElementById("emailError");
            const passwordError = document.getElementById("passwordError");
            const roleError = document.getElementById("roleError");

            // 2. Reset Styles & Errors
            name.classList.remove("error-border");
            email.classList.remove("error-border");
            password.classList.remove("error-border");
            role.classList.remove("error-border");

            nameError.innerHTML = "";
            emailError.innerHTML = "";
            passwordError.innerHTML = "";
            roleError.innerHTML = "";
            message.innerHTML = "";

            let valid = true;

            // 3. Validation Logic
            if (name.value.trim() === "") {
                name.classList.add("error-border");
                nameError.innerHTML = "Name is required";
                valid = false;
            }
            if (email.value.trim() === "") {
                email.classList.add("error-border");
                emailError.innerHTML = "Email is required";
                valid = false;
            }
            if (role.value === "") {
                role.classList.add("error-border");
                roleError.innerHTML = "Please select a role";
                valid = false;
            }

            if (password.value === "") {
                password.classList.add("error-border");
                passwordError.innerHTML = "Password is required";
                valid = false;
            } else {
                const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
                if (!passwordPattern.test(password.value)) {
                    password.classList.add("error-border");
                    passwordError.innerHTML = "Password must be at least 8 characters with uppercase, lowercase, number, and special character.";
                    valid = false;
                }
            }

            // 4. Final Result
            if (!valid) return;

            // Register via Backend
            message.innerHTML = "Registering Account...";
            message.className = "message";

            const requestBody = {
                name: name.value.trim(),
                email: email.value.trim(),
                password: password.value,
                role: role.value,
                department: role.value === 'STUDENT' ? 'General' : 'Faculty' // default values
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                if (response.ok) {
                    message.innerHTML = "Account created safely! Redirecting to login...";
                    message.className = "message success";
                    setTimeout(function () {
                        window.location.href = "index.html";
                    }, 2000);
                } else {
                    const errorText = await response.text();
                    message.innerHTML = "❌ Creation failed: " + errorText;
                    message.className = "message error";
                }
            } catch (error) {
                message.innerHTML = "❌ Could not connect to the server.";
                message.className = "message error";
                console.error(error);
            }
        });
    </script>
</body>

</html>
