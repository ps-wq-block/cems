<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Organizer Profile | CEMS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }

        .container {
            width: 60%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .title {
            background: linear-gradient(90deg, #6c63ff, #7b68ee);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 28px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        label {
            font-size: 18px;
            display: block;
            margin-top: 18px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:readonly {
            background-color: #f9f9f9;
            color: #888;
        }

        .buttons {
            margin-top: 30px;
            text-align: center;
        }

        .save {
            background: green;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            margin-right: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .cancel {
            background: red;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }

        .save:hover, .cancel:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title">Edit Organizer Profile</div>
        <form id="editForm" onsubmit="saveOrganizer(event)">
            <label for="name">Full Name</label>
            <input type="text" id="name" required>

            <label for="email">Email (Read-only)</label>
            <input type="email" id="email" readonly>

            <label for="phone">Phone Number</label>
            <input type="text" id="phone" maxlength="10" required>

            <label for="dept">Department</label>
            <input type="text" id="dept">

            <label for="college">College</label>
            <input type="text" id="college">

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob">

            <label for="gender">Gender</label>
            <input type="text" id="gender">

            <label for="address">Address</label>
            <input type="text" id="address">

            <div class="buttons">
                <button type="submit" class="save">Save Changes</button>
                <a href="OrganizerProfile.html" class="cancel">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        // Role Guard
        if (!localStorage.getItem("jwt")) { window.location.href = "index.html"; }

        const userId = localStorage.getItem("userId");
        const jwt = localStorage.getItem("jwt");

        if (!userId || !jwt) {
            window.location.href = "index.html";
        }

        async function loadProfile() {
            try {
                const response = await fetch(`/api/auth/users/${userId}`, {
                    headers: { 'Authorization': 'Bearer ' + jwt }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("name").value = data.name || "";
                    document.getElementById("email").value = data.email || "";
                    document.getElementById("phone").value = data.phoneNumber || "";
                    document.getElementById("dob").value = data.dateOfBirth || "";
                    document.getElementById("gender").value = data.gender || "";
                    document.getElementById("dept").value = data.department || "";
                    document.getElementById("college").value = data.college || "";
                    document.getElementById("address").value = data.address || "";
                } else {
                    alert("Failed to fetch profile data.");
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error("Error fetching profile:", error);
            }
        }

        async function saveOrganizer(e) {
            e.preventDefault();

            const phone = document.getElementById("phone").value;
            if (phone.length !== 10) {
                alert("Phone number must be exactly 10 digits");
                return;
            }

            const updatedData = {
                name: document.getElementById("name").value,
                phoneNumber: phone,
                dateOfBirth: document.getElementById("dob").value,
                gender: document.getElementById("gender").value,
                department: document.getElementById("dept").value,
                college: document.getElementById("college").value,
                address: document.getElementById("address").value
            };

            try {
                const response = await fetch(`/api/auth/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + jwt
                    },
                    body: JSON.stringify(updatedData)
                });

                if (response.ok) {
                    alert("Profile updated successfully");
                    // Update localStorage to keep UI consistent
                    localStorage.setItem("userName", updatedData.name);
                    window.location.href = "OrganizerProfile.html";
                } else {
                    alert("Failed to update profile.");
                }
            } catch (error) {
                console.error("Error updating profile:", error);
                alert("Error connecting to server.");
            }
        }

        window.onload = loadProfile;
    </script>

</body>
</html>
