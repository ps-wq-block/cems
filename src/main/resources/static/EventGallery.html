<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMS | Event Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #36d1dc;
            --secondary: #5b86e5;
            --accent: #6a5acd;
            --bg-gradient: linear-gradient(135deg, #89f7fe, #fbc2eb);
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --glass-border: rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Navbar Styling */
        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h2 {
            margin: 0;
            font-size: 24px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-sub);
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--secondary);
        }

        /* Hero / Header Section */
        .gallery-header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .gallery-header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #444;
        }

        .gallery-header p {
            color: var(--text-sub);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        /* Upload Section (Role Protected) */
        .admin-controls {
            max-width: 800px;
            margin: 0 auto 50px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; /* Hidden by default, shown by JS */
        }

        .upload-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #f8faff;
            box-sizing: border-box;
        }

        .btn-upload {
            padding: 12px 30px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            align-self: flex-end;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(54, 209, 220, 0.4);
        }

        /* Gallery Grid */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.5);
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--secondary);
            color: white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .photo-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
            position: relative;
        }

        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .photo-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .photo-category {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            background: #eee;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: none; /* Only for admin/organizer */
            place-items: center;
            font-weight: bold;
        }

        /* Modal / Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            background: white;
            color: #333;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h2>CEMS Gallery</h2>
        <div class="nav-links">
            <a href="categories.html">Events</a>
            <a href="index.html" onclick="localStorage.clear()">Logout</a>
        </div>
    </nav>

    <div class="gallery-header">
        <h1>Capture the Moments</h1>
        <p>A glimpse into the vibrant campus life and events at our college.</p>
    </div>

    <!-- Admin/Organizer Upload Section -->
    <div id="adminArea" class="admin-controls">
        <h3 style="margin-top:0">Upload Event Highlights</h3>
        <div class="upload-form">
            <div class="input-group">
                <label>Category</label>
                <select id="photoCategory" onchange="loadEventsByCategory()">
                    <option value="">Select Category</option>
                    <option value="Technical">Technical</option>
                    <option value="Sports">Sports</option>
                    <option value="Cultural">Cultural</option>
                    <option value="Workshops">Workshops</option>
                </select>
            </div>
            <div class="input-group">
                <label>Event Name</label>
                <select id="photoEvent">
                    <option value="">Select Event</option>
                </select>
            </div>
            <div class="input-group" style="flex:2">
                <label>Choose Photo</label>
                <input type="file" id="photoFile" accept="image/*">
            </div>
            <button class="btn-upload" onclick="uploadPhoto()">Upload to Gallery</button>
        </div>
    </div>

    <div class="gallery-container">
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-btn active" onclick="filterGallery('All')">All</button>
            <button class="filter-btn" onclick="filterGallery('Technical')">Technical</button>
            <button class="filter-btn" onclick="filterGallery('Sports')">Sports</button>
            <button class="filter-btn" onclick="filterGallery('Cultural')">Cultural</button>
            <button class="filter-btn" onclick="filterGallery('Workshops')">Workshops</button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Photos will be loaded here -->
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const role = (localStorage.getItem('role') || "").toUpperCase();
        const isAdmin = role === 'ADMIN' || role === 'ORGANIZER';

        // Initialize UI based on role
        if (isAdmin) {
            document.getElementById('adminArea').style.display = 'block';
        }

        async function loadEventsByCategory() {
            const category = document.getElementById('photoCategory').value;
            const eventDropdown = document.getElementById('photoEvent');
            eventDropdown.innerHTML = '<option value="">Select Event</option>';

            if (!category) return;

            try {
                const response = await fetch(`/api/events/approved?category=${category}`);
                const events = await response.json();
                events.forEach(ev => {
                    const opt = document.createElement('option');
                    opt.value = ev.name;
                    opt.textContent = ev.name;
                    eventDropdown.appendChild(opt);
                });
            } catch (err) {
                console.error("Failed to load events", err);
            }
        }

        async function loadPhotos() {
            try {
                const response = await fetch('/api/gallery/photos');
                const photos = await response.json();
                renderPhotos(photos);
            } catch (err) {
                console.error("Load failed", err);
            }
        }

        function renderPhotos(photos) {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            photos.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <div style="position: relative;">
                        <img src="${photo.photoData}" alt="Event Photo">
                        <div style="position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem;">
                            ${photo.eventName || 'Unnamed Event'}
                        </div>
                    </div>
                    <div class="photo-info">
                        <span class="photo-category">${photo.category}</span>
                        <button class="delete-btn" style="display: ${isAdmin ? 'grid' : 'none'}" onclick="deletePhoto('${photo.id}')">✕</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function uploadPhoto() {
            const fileInput = document.getElementById('photoFile');
            const category = document.getElementById('photoCategory').value;
            const eventName = document.getElementById('photoEvent').value;
            
            if (!category || !eventName) {
                showToast("Please select category and event first!", "error");
                return;
            }

            if (!fileInput.files[0]) {
                showToast("Please select a file first!", "error");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onloadend = async function() {
                const base64String = reader.result;
                const token = localStorage.getItem('jwt');

                try {
                    const response = await fetch('/api/gallery/upload', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({
                            category: category,
                            eventName: eventName,
                            photoData: base64String
                        })
                    });

                    if (response.ok) {
                        showToast("Photo uploaded successfully! ✅");
                        loadPhotos();
                        fileInput.value = '';
                    } else {
                        const err = await response.text();
                        showToast("Upload failed ❌: " + (err || "Check role permissions"), "error");
                    }
                } catch (err) {
                    showToast("Network error ❌", "error");
                }
            };
            reader.readAsDataURL(file);
        }

        async function deletePhoto(id) {
            if (!confirm("Are you sure you want to delete this photo?")) return;
            const token = localStorage.getItem('jwt');
            try {
                const response = await fetch(`/api/gallery/photos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    showToast("Photo deleted 🗑️");
                    loadPhotos();
                }
            } catch (err) {
                showToast("Delete failed ❌", "error");
            }
        }

        function filterGallery(category) {
            // Update active button
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            // Fetch filtered
            const url = category === 'All' ? '/api/gallery/photos' : `/api/gallery/photos?category=${category}`;
            fetch(url).then(r => r.json()).then(renderPhotos);
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = type === "success" ? "#4caf50" : "#f44336";
            toast.style.color = "white";
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        window.onload = loadPhotos;
    </script>
</body>
</html>
