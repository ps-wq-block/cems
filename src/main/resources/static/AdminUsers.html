<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users - Admin</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f3e8ff, #e6f7f5);
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #444;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            margin-left: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-student {
            background: #e0f2fe;
            color: #0369a1;
        }

        .badge-organizer {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-admin {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #5b86e5;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">CEMS Admin</div>
        <div class="nav-links">
            <a href="AdminDashboard.html">Dashboard</a>
            <a href="#" class="logout" onclick="localStorage.removeItem('jwt'); localStorage.removeItem('role'); localStorage.removeItem('userId');; window.location.href='index.html'">Logout</a>
        </div>
    </div>

    <div class="container">
        <a href="AdminDashboard.html" class="btn-back">← Back to Dashboard</a>
        <h1>System Users</h1>
        <div id="tableContainer">
            <p style="text-align:center;">Loading users...</p>
        </div>
    </div>

    <script>
        // Role Guard
        if (!localStorage.getItem("jwt")) { window.location.href = "index.html"; }

        async function fetchUsers() {
            const container = document.getElementById('tableContainer');
            try {
                const response = await fetch('/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }
                });

                if (response.ok) {
                    const users = await response.json();
                    let tableHtml = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Phone</th>
                                    <th>Department</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    users.forEach(user => {
                        const roleClass = `badge-${user.role.toLowerCase()}`;
                        tableHtml += `
                            <tr>
                                <td>${user.fullName || user.username || 'N/A'}</td>
                                <td>${user.email}</td>
                                <td><span class="badge ${roleClass}">${user.role}</span></td>
                                <td>${user.phoneNumber || '-'}</td>
                                <td>${user.department || '-'}</td>
                            </tr>
                        `;
                    });

                    tableHtml += `</tbody></table>`;
                    container.innerHTML = tableHtml;
                } else {
                    container.innerHTML = '<p style="color:red; text-align:center;">Failed to load data.</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color:red; text-align:center;">Connection error.</p>';
            }
        }

        fetchUsers();
    </script>
</body>

</html>
