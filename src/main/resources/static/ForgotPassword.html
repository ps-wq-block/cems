<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CEMS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #89f7fe, #fbc2eb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .forgot-container {
            background: #ffffff;
            padding: 40px;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            color: #444;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #f0f4ff;
            box-sizing: border-box;
        }

        .error-text {
            color: red;
            font-size: 12px;
            display: block;
            margin-top: 4px;
        }

        .error-border {
            border: 2px solid red !important;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6a5acd;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        #otpSection,
        #passwordSection {
            display: none;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .password-hint {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <div class="forgot-container">
        <h2>Reset Password</h2>

        <div class="input-group">
            <label>Registered Email</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>
        <button class="btn" onclick="sendOTP()">Send OTP</button>

        <div id="otpSection">
            <div class="input-group">
                <label>Enter OTP</label>
                <input type="text" id="otpInput" placeholder="6-digit code">
            </div>
            <button class="btn" onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="passwordSection">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPass" placeholder="********">
                <small class="password-hint">Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special character
                    (@$!%*?&)</small>
                <small class="error-text" id="passError"></small>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="********">
                <small class="error-text" id="confirmError"></small>
            </div>
            <button class="btn" onclick="finishReset()">Update Password</button>
        </div>

        <a href="index.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        let mockOTP = "";

        function generateOTP() {
            // Generate a random 6-digit OTP
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        async function sendOTP() {
            const email = document.getElementById('email').value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;

            if (!emailPattern.test(email)) {
                alert("Please enter a valid email address (e.g. name@gmail.com)");
                return;
            }

            try {
                // Check if email exists in database
                const response = await fetch('/api/auth/check-email?email=' + encodeURIComponent(email));
                if (!response.ok) {
                    alert("This email is not registered in our system.");
                    return;
                }
            } catch (error) {
                alert("Error connecting to server. Please try again later.");
                console.error("Check email error:", error);
                return;
            }

            mockOTP = generateOTP();
            alert("OTP sent to " + email + " (Use: " + mockOTP + ")");
            document.getElementById('otpSection').style.display = 'block';
        }

        function verifyOTP() {
            const input = document.getElementById('otpInput').value;
            if (input === mockOTP) {
                alert("OTP Verified!");
                document.getElementById('passwordSection').style.display = 'block';
            } else {
                alert("Invalid OTP!");
            }
        }

        async function finishReset() {
            const pass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const email = document.getElementById('email').value;
            const passError = document.getElementById('passError');
            const confirmError = document.getElementById('confirmError');

            // Clear previous errors
            passError.innerHTML = "";
            confirmError.innerHTML = "";
            document.getElementById('newPass').classList.remove("error-border");
            document.getElementById('confirmPass').classList.remove("error-border");

            let valid = true;

            // Password pattern: 8 chars, 1 Upper, 1 Lower, 1 Number, 1 Special
            const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordPattern.test(pass)) {
                document.getElementById('newPass').classList.add("error-border");
                passError.innerHTML = "Password must be at least 8 characters with uppercase, lowercase, number, and special character.";
                valid = false;
            }

            // Confirm password match
            if (pass !== confirmPass) {
                document.getElementById('confirmPass').classList.add("error-border");
                confirmError.innerHTML = "Passwords do not match.";
                valid = false;
            }

            if (!valid) return;

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, newPassword: pass })
                });

                if (response.ok) {
                    alert("Password Updated Successfully! Returning to Login...");
                    window.location.href = "index.html";
                } else {
                    alert("Failed! Could not find an account with that email in the system.");
                }
            } catch (error) {
                alert("Error connecting to backend server.");
                console.error("Error:", error);
            }
        }
    </script>

</body>

</html>
