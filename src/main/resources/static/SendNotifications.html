<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg,#6dd5fa,#c89cff,#a1ffce);">

  <div class="w-full max-w-3xl bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold text-white bg-gradient-to-r from-sky-500 to-emerald-500 py-3 rounded-xl">
        Send Notifications
      </h1>
      <p class="text-gray-600 mt-2">Send important announcements to all users</p>
      <a href="AdminDashboard.html" class="block mt-2 text-sky-600 hover:underline">Back to Dashboard</a>
    </div>

    <form id="notificationForm" onsubmit="scheduleNotification(event)" class="space-y-4">
      <div>
        <label class="block font-medium mb-1">Notification Title</label>
        <input type="text" id="title" required placeholder="Enter title" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-teal-400" />
      </div>

      <div>
        <label class="block font-medium mb-1">Message</label>
        <textarea id="msg" required rows="4" placeholder="Enter message..." class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-teal-400"></textarea>
      </div>

      <div>
        <label class="block font-medium mb-1">Send To</label>
        <select id="target" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-teal-400">
          <option value="Both">All Users</option>
          <option value="Admin">Organizers/Admins</option>
          <option value="Students">Students</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block font-medium mb-1">Schedule Date</label>
          <input type="date" id="date" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-teal-400" />
        </div>
        <div>
          <label class="block font-medium mb-1">Schedule Time</label>
          <input type="time" id="time" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-teal-400" />
        </div>
      </div>

      <div class="mt-6 flex justify-center gap-4">
        <button type="submit" id="submitBtn" class="bg-gradient-to-r from-sky-500 to-emerald-500 text-white px-6 py-2 rounded-xl shadow-lg hover:scale-105 transition">
          Send / Schedule
        </button>
        <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="hidden bg-gray-400 text-white px-6 py-2 rounded-xl shadow-lg hover:scale-105 transition">
          Cancel Edit
        </button>
      </div>
    </form>

    <!-- Scheduled Notifications List -->
    <div class="mt-8">
      <h2 class="text-lg font-semibold text-gray-700 mb-3 border-b pb-2">Scheduled Notifications</h2>
      <div id="notifList" class="space-y-3">
        <p class="text-gray-400 text-center py-4">Loading...</p>
      </div>
    </div>
  </div>

<script>
    // Role Guard
    const _role = localStorage.getItem("role"); 
    if (!localStorage.getItem("jwt") || (_role && _role.toUpperCase() !== "ADMIN" && _role.toUpperCase() !== "ORGANIZER")) { 
        window.location.href = "index.html"; 
    }

    // Set Dashboard Link
    document.addEventListener("DOMContentLoaded", () => {
        const backLink = document.querySelector('a[href="AdminDashboard.html"]');
        if (backLink && _role && _role.toUpperCase() === "ORGANIZER") {
            backLink.href = "OrganizerDashboard.html";
        }
    });

    // Set min date to today
    document.addEventListener("DOMContentLoaded", () => {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        document.getElementById('date').min = `${yyyy}-${mm}-${dd}`;
        loadNotifications();
    });

    let editingId = null;

    async function scheduleNotification(event) {
        event.preventDefault();

        const selectedDate = document.getElementById('date').value;
        const selectedTime = document.getElementById('time').value;
        if (selectedDate && selectedTime) {
            const selectedDateTime = new Date(selectedDate + 'T' + selectedTime);
            if (selectedDateTime < new Date()) {
                alert("Cannot schedule a notification in the past. Please select a future date and time.");
                return;
            }
        }

        const payload = {
            title: document.getElementById('title').value,
            message: document.getElementById('msg').value,
            receiver: document.getElementById('target').value,
            eventDate: selectedDate,
            eventTime: selectedTime
        };

        const token = localStorage.getItem('jwt');
        const method = editingId ? 'PUT' : 'POST';
        const url = editingId ? `/api/notifications/${editingId}` : '/api/notifications';

        const res = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token ? 'Bearer ' + token : ''
            },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            alert(editingId ? "Notification updated successfully!" : "Notification dispatched successfully!");
            cancelEdit();
            document.getElementById("notificationForm").reset();
            loadNotifications();
        } else {
            alert("Failed to process notification.");
        }
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById("submitBtn").innerText = "Send / Schedule";
        document.getElementById("submitBtn").className = "bg-gradient-to-r from-sky-500 to-emerald-500 text-white px-6 py-2 rounded-xl shadow-lg hover:scale-105 transition";
        document.getElementById("cancelEditBtn").classList.add("hidden");
        document.getElementById("notificationForm").reset();
    }

    function editNotification(notif) {
        editingId = notif.id;
        document.getElementById('title').value = notif.title || '';
        document.getElementById('msg').value = notif.message || '';
        document.getElementById('target').value = notif.receiver || 'Both';
        document.getElementById('date').value = notif.eventDate || '';
        document.getElementById('time').value = notif.eventTime || '';

        document.getElementById("submitBtn").innerText = "Update Notification";
        document.getElementById("submitBtn").className = "bg-gradient-to-r from-amber-500 to-orange-500 text-white px-6 py-2 rounded-xl shadow-lg hover:scale-105 transition";
        document.getElementById("cancelEditBtn").classList.remove("hidden");

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteNotification(id) {
        if (!confirm("Are you sure you want to delete this notification?")) return;
        const token = localStorage.getItem('jwt');
        const res = await fetch(`/api/notifications/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': token ? 'Bearer ' + token : '' }
        });
        if (res.ok) {
            loadNotifications();
        } else {
            alert("Failed to delete notification.");
        }
    }

    async function loadNotifications() {
        const container = document.getElementById('notifList');
        try {
            const token = localStorage.getItem('jwt');
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': token ? 'Bearer ' + token : '' }
            });
            if (!res.ok) { container.innerHTML = '<p class="text-red-400 text-center">Failed to load.</p>'; return; }

            const notifs = await res.json();
            // Sort newest first
            notifs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            // Filter to only admin/organizer-sent notifications (exclude auto-generated student ones)
            const scheduled = notifs.filter(n => n.receiver === 'Both' || n.receiver === 'Admin' || n.receiver === 'Students');

            if (scheduled.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4">No scheduled notifications yet.</p>';
                return;
            }

            container.innerHTML = '';
            scheduled.forEach(n => {
                const card = document.createElement('div');
                card.className = 'bg-white border rounded-xl p-4 shadow-sm flex justify-between items-start gap-4';

                const dateLabel = n.eventDate || 'No date';
                const timeLabel = n.eventTime || '';
                const targetLabel = n.receiver === 'Both' ? 'All Users' : n.receiver;

                card.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-gray-800 truncate">${n.title}</div>
                        <div class="text-sm text-gray-500 mt-1 line-clamp-2">${n.message}</div>
                        <div class="flex gap-3 mt-2 text-xs text-gray-400">
                            <span>📅 ${dateLabel} ${timeLabel}</span>
                            <span>👥 ${targetLabel}</span>
                        </div>
                    </div>
                    <div class="flex gap-2 flex-shrink-0">
                        <button onclick='editNotification(${JSON.stringify(n).replace(/'/g, "&#39;")})' class="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg text-sm font-semibold hover:bg-amber-200 transition">Edit</button>
                        <button onclick="deleteNotification('${n.id}')" class="bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm font-semibold hover:bg-red-200 transition">Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            console.error(err);
            container.innerHTML = '<p class="text-red-400 text-center">Error loading notifications.</p>';
        }
    }
</script>
</body>
</html>
