<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #7aa5d2, #7ed6a5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    width: 420px;
    background: #e6e6e6;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    max-height: 90vh;
    overflow-y: auto;
}
.title {
    background: linear-gradient(135deg, #5f6bdc, #8e44ad);
    color: white;
    text-align: center;
    padding: 12px;
    border-radius: 12px;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
}
.notification {
    background: #dcdde1;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
    position: relative;
    border-left: 5px solid #ff6a88;
}
.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 8px;
    background: #ff6a88;
    color: white;
}
.notification h4 { margin: 5px 0; }
.notification p { margin: 5px 0; font-size: 14px; }
small { color: #555; }
.back-btn { display: block; text-align: center; margin-bottom: 15px; font-weight: bold; color: #5f6bdc; text-decoration: none; }
</style>
</head>
<body>

<div class="container">
    <div class="title">Notifications Inbox</div>
    <a href="#" class="back-btn" onclick="goBack()">Go Back</a>
    <div id="notifBox">
       Loading notifications...
    </div>
</div>

<script>
function goBack() {
    window.history.back();
}

async function loadNotifications() {
    let role = localStorage.getItem('role') || 'STUDENT';
    // Mappings: "ORGANIZER" and "ADMIN" see "Admin"
    let target = role === 'STUDENT' ? 'Students' : 'Admin';

    try {
        const token = localStorage.getItem('jwt');
        const res = await fetch('/api/notifications', {
            headers: { 'Authorization': token ? 'Bearer ' + token : '' }
        });
        const notifs = await res.json();
        
        const now = new Date();
        const filtered = notifs
            .filter(n => n.receiver === target || n.receiver === 'Both')
            .filter(n => {
                if(!n.eventDate || !n.eventTime) return true;
                return new Date(n.eventDate + 'T' + n.eventTime) <= now;
            })
            .sort((a,b) => {
                const dA = new Date(a.eventDate && a.eventTime ? a.eventDate + 'T' + a.eventTime : (a.createdAt || 0));
                const dB = new Date(b.eventDate && b.eventTime ? b.eventDate + 'T' + b.eventTime : (b.createdAt || 0));
                return dB - dA;
            });
            
        const container = document.getElementById('notifBox');
        
        if(filtered.length === 0) {
            container.innerHTML = "<p style='text-align:center'>No clear notifications found.</p>";
            return;
        }

        let seenStr = localStorage.getItem('seenNotifications') || '[]';
        let seen = JSON.parse(seenStr);
        let updatedSeen = false;

        container.innerHTML = filtered.map(n => {
            const uid = n.id || n._id || (n.title + (n.createdAt||''));
            const isNew = !seen.includes(uid);
            if (isNew) {
                seen.push(uid);
                updatedSeen = true;
            }
            return `
            <div class="notification">
                ${isNew ? '<span class="badge">New</span>' : ''}
                <h4>${n.title}</h4>
                <p>${n.message}</p>
                <small>${n.eventDate || ''} ${n.eventTime || ''}</small>
            </div>
            `;
        }).join('');
        
        if (updatedSeen) {
            localStorage.setItem('seenNotifications', JSON.stringify(seen));
        }
    } catch(err) {
        document.getElementById('notifBox').innerHTML = 'Error loading notifications.';
    }
}
document.addEventListener('DOMContentLoaded', loadNotifications);
</script>
</body>
</html>
