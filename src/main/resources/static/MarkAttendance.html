<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Attendance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg,#6dd5fa,#c89cff,#a1ffce);">

  <div class="w-full max-w-4xl bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold text-white bg-gradient-to-r from-sky-500 to-emerald-500 py-3 rounded-xl">
        Mark Attendance
      </h1>
      <a href="OrganizerDashboard.html" class="block mt-2 text-sky-600 hover:underline">Back to Dashboard</a>
    </div>

    <div class="mb-4">
      <label class="block font-medium mb-1">Select Event</label>
      <select id="eventSelect" onchange="loadParticipants()" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400">
      </select>
    </div>

    <div class="mb-4">
      <input type="text" id="searchBox" oninput="filterTable()" placeholder="Search participant..." class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400" />
    </div>

    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-teal-100 text-gray-700">
            <th class="p-2 border">Roll Number</th>
            <th class="p-2 border">Name</th>
            <th class="p-2 border">Email</th>
            <th class="p-2 border">Course</th>
            <th class="p-2 border">Present</th>
          </tr>
        </thead>
        <tbody id="participantsTable">
        </tbody>
      </table>
    </div>

    <div class="mt-6 text-center">
      <button onclick="saveAttendance()" class="bg-gradient-to-r from-sky-500 to-emerald-500 text-white px-8 py-2 rounded-xl shadow-lg hover:scale-105 transition">
        Save Attendance
      </button>
    </div>
  </div>

<script>
    if (!localStorage.getItem('jwt')) { window.location.href = 'index.html'; }
</script>
<script>
async function loadEvents() {
    const res = await fetch('/api/admin/events', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }});
    const events = res.ok ? await res.json() : await (await fetch('/api/events')).json();
    const select = document.getElementById('eventSelect');
    select.innerHTML = events.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
    if(events.length > 0) loadParticipants();
}

async function loadParticipants() {
    const eventName = document.getElementById('eventSelect').value;
    const res = await fetch(`/api/registrations/event/${eventName}`, {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }
    });
    const participants = await res.json();
    const tbody = document.getElementById('participantsTable');
    tbody.innerHTML = participants.map(p => `
      <tr class="hover:bg-teal-50" data-id="${p.id}">
        <td class="p-2 border">${p.rollNumber || '-'}</td>
        <td class="p-2 border name-cell">${p.studentName}</td>
        <td class="p-2 border email-cell">${p.email}</td>
        <td class="p-2 border">${p.course || '-'}</td>
        <td class="p-2 border text-center">
          <input type="checkbox" class="w-4 h-4 accent-emerald-500" ${p.isPresent ? 'checked' : ''} />
        </td>
      </tr>
    `).join('');
}

function filterTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    document.querySelectorAll('#participantsTable tr').forEach(row => {
        const name = row.querySelector('.name-cell').innerText.toLowerCase();
        row.style.display = name.includes(q) ? '' : 'none';
    });
}

async function saveAttendance() {
    const eventName = document.getElementById('eventSelect').value;
    const resRaw = await fetch(`/api/registrations/event/${eventName}`, {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }
    });
    const participants = await resRaw.json();

    const rows = document.querySelectorAll('#participantsTable tr');
    Array.from(rows).forEach(row => {
        const id = row.getAttribute('data-id');
        const isPres = row.querySelector('input').checked;
        const p = participants.find(x => x.id === id);
        if(p) p.isPresent = isPres;
    });

    const res = await fetch('/api/registrations/bulk-update', {
        method: 'PUT',
        headers: { 
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('jwt')
        },
        body: JSON.stringify(participants)
    });
    if(res.ok) {
        alert("Attendance saved successfully!");
    } else {
        alert("Error saving attendance. Please check your permissions.");
    }
}

document.addEventListener('DOMContentLoaded', loadEvents);
</script>
</body>
</html>
