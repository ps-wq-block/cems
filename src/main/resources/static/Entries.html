<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Entries - Organizer</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e6f7f5, #f3e8ff);
            min-height: 100vh;
        }

        .navbar {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #444;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: bold;
            margin-left: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
        }

        tr:hover {
            background-color: #fafafa;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            background: #eef2ff;
            color: #4f46e5;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #8ec5a4;
            text-decoration: none;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .controls input, .controls select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .controls input {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">CEMS Organizer</div>
        <div class="nav-links">
            <a href="OrganizerDashboard.html">Dashboard</a>
            <a href="index.html" onclick="localStorage.removeItem('jwt'); localStorage.removeItem('role'); localStorage.removeItem('userId');">Logout</a>
        </div>
    </div>

    <div class="container">
        <a href="OrganizerDashboard.html" class="btn-back">← Back to Dashboard</a>
        <h1>Student Registrations</h1>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search by student name, roll no, or email..." onkeyup="filterRegistrations()">
            <select id="eventFilter" onchange="filterRegistrations()">
                <option value="">All Events</option>
            </select>
        </div>

        <div id="tableContainer">
            <p style="text-align:center;">Loading registrations...</p>
        </div>
    </div>

    <script>
        // Role Guard
        const _role = localStorage.getItem("role"); if (!localStorage.getItem("jwt") || (_role && _role.toUpperCase() !== "ORGANIZER")) { window.location.href = "index.html"; }

        let allRegistrations = [];

        async function fetchRegistrations() {
            const container = document.getElementById('tableContainer');
            try {
                const response = await fetch('/api/organizer/registrations', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') }
                });

                if (response.ok) {
                    allRegistrations = await response.json();
                    
                    if (allRegistrations.length === 0) {
                        container.innerHTML = '<div class="no-data">No registrations found for your events.</div>';
                        document.querySelector('.controls').style.display = 'none';
                        return;
                    }

                    // Populate Event Filter Dropdown
                    const uniqueEvents = [...new Set(allRegistrations.map(reg => reg.eventName))];
                    const eventSelect = document.getElementById('eventFilter');
                    uniqueEvents.forEach(evt => {
                        if(evt) {
                            const opt = document.createElement("option");
                            opt.value = evt;
                            opt.textContent = evt;
                            eventSelect.appendChild(opt);
                        }
                    });

                    filterRegistrations();
                } else {
                    container.innerHTML = '<p style="color:red; text-align:center;">Failed to load data. Please log in again.</p>';
                }
            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = '<p style="color:red; text-align:center;">Connection error.</p>';
            }
        }

        function filterRegistrations() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const eventFltr = document.getElementById('eventFilter').value;

            const filtered = allRegistrations.filter(reg => {
                const matchesSearch = 
                    (reg.studentName && reg.studentName.toLowerCase().includes(query)) ||
                    (reg.email && reg.email.toLowerCase().includes(query)) ||
                    (reg.rollNumber && reg.rollNumber.toLowerCase().includes(query));
                const matchesEvent = eventFltr === "" || reg.eventName === eventFltr;
                
                return matchesSearch && matchesEvent;
            });

            renderTable(filtered);
        }

        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            if (data.length === 0) {
                container.innerHTML = '<div class="no-data">No registrations match your search criteria.</div>';
                return;
            }

            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Email</th>
                            <th>Roll Number</th>
                            <th>Course</th>
                            <th>Event Name</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(reg => {
                tableHtml += `
                    <tr>
                        <td>${reg.studentName || '-'}</td>
                        <td>${reg.email || '-'}</td>
                        <td>${reg.rollNumber || '-'}</td>
                        <td>${reg.course || '-'}</td>
                        <td><span class="badge">${reg.eventName || '-'}</span></td>
                        <td>${reg.phoneNumber || '-'}</td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            container.innerHTML = tableHtml;
        }

        fetchRegistrations();
    </script>
</body>

</html>
