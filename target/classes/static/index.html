<!DOCTYPE html>
<html>

<head>
    <title>Assign Faculty Coordinator</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;

            /* Consistent Light mixed background */
            background: linear-gradient(135deg, #e6f7f5, #f3e8ff);
        }

        /* Main container */

        .container {
            width: 520px;
            margin: 40px auto;
            background: linear-gradient(135deg, #f8fffd, #eef7f6);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.15);
        }

        /* Heading box */

        .heading {
            background: linear-gradient(to right, #9ad7cf, #cdb4db);
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #2b2b2b;
        }

        /* Labels */

        label {
            font-weight: bold;
            color: #2f3e46;
            display: block;
            margin-top: 10px;
        }

        /* Input fields */

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #b7d6d2;
            background: #f4fffc;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
        }

        /* Buttons layout (Two buttons split the width) */

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        /* Equal size buttons */

        .buttons button {
            flex: 1;
        }

        /* Buttons styling */

        button {
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }

        .notify {
            background: #a29bfe;
            /* Soft purple */
        }

        .assign {
            background: #8ec5a4;
            /* Soft green */
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="heading">
            Assign Faculty Coordinator
        </div>

        <!-- Added ID to form -->
        <form id="assignmentForm">

            <label>Select Event</label>
            <!-- Added ID and Name to inputs -->
            <select id="event" required>
                <option value="">Select an event...</option>
                <option value="Tech Fest 2026">Tech Fest 2026</option>
                <option value="Sports Meet">Sports Meet</option>
                <option value="Annual Cultural Gala">Annual Cultural Gala</option>
            </select>

            <label>Faculty Name</label>
            <input type="text" id="facultyName" placeholder="Enter full name (e.g., Dr. Jane Doe)" required>

            <label>Faculty / Employee ID</label>
            <input type="text" id="facultyId" placeholder="Enter faculty ID" required>

            <label>Department</label>
            <input type="text" id="department" placeholder="e.g. Information Technology" required>

            <label>Contact Number</label>
            <input type="tel" id="contactNumber" placeholder="Enter mobile number" required>

            <label>Email Address</label>
            <input type="email" id="emailAddress" placeholder="Enter faculty email address" required>

            <label>Assigned Responsibilities</label>
            <textarea id="responsibilities" placeholder="Specify the duties for this faculty member..."
                required></textarea>

            <div class="buttons">

                <button type="button" class="notify" onclick="alert('Notification simulated!')">Notify Faculty</button>

                <button type="submit" class="assign">Confirm Assignment</button>

            </div>

            <div id="statusMessage" class="message"></div>

        </form>

    </div>

    <script>
        document.getElementById('assignmentForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            // In this repo, index.html is acting as a demo Faculty Assignment form
            // Let's repurpose this specific script section to handle a "Login Simulation" 
            // or just let the user know we would normally login here in a real app,
            // but right now index.html is just an Assignment Form in this codebase.

            // Gather form data
            const data = {
                event: document.getElementById('event').value,
                facultyName: document.getElementById('facultyName').value,
                facultyId: document.getElementById('facultyId').value,
                department: document.getElementById('department').value,
                contactNumber: document.getElementById('contactNumber').value,
                emailAddress: document.getElementById('emailAddress').value,
                responsibilities: document.getElementById('responsibilities').value
            };

            const statusMessage = document.getElementById('statusMessage');

            try {
                const response = await fetch('http://localhost:8080/api/assignments', { // Reaching our Spring Boot backend
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    statusMessage.className = 'message success';
                    statusMessage.textContent = 'Assignment successfully saved with ID: ' + result.id;

                    // SIMULATED LOGIN FOR PROFILES:
                    // Pretend this faculty is now a logged in "Student" for demo purposes of Phase 3
                    localStorage.setItem("userId", "1");
                    localStorage.setItem("userName", result.facultyName);

                    this.reset(); // clear form
                } else {
                    statusMessage.className = 'message error';
                    statusMessage.textContent = 'Failed to save assignment. Status: ' + response.status;
                }
            } catch (error) {
                statusMessage.className = 'message error';
                statusMessage.textContent = 'Error connecting to the backend.';
                console.error('Error:', error);
            }
        });
    </script>

</body>

</html>
